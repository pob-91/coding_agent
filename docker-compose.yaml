services:
  main-db:
    image: couchdb:3
    restart: always
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    networks:
      - internal-network

  coding-agent:
    image: coding-agent:latest
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    networks:
      - internal-network

volumes:
  couchdb_data:

networks:
  internal-network:
    name: internal-network
