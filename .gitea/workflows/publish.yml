name: Build and Push Coding Agent Docker Image

on:
  push:
    tags:
      - "*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to gitea registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ gitea.server_url }}" -u "${{ gitea.actor }}" --password-stdin

      - name: Set up Docker Buildx
        run: docker buildx create --use

      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --tag ${{ gitea.server_url }}/${{ gitea.repository_owner }}/coding-agent:${{ gitea.ref_name }} \
            .
