name: Build and Push Coding Agent Docker Image

on:
  push:
    tags:
      - "*"

jobs:
  build-and-push:
    if: ${{ contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/coding-agent:latest
            ghcr.io/${{ github.repository_owner }}/coding-agent:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/coding-agent:${{ github.ref_name }}
